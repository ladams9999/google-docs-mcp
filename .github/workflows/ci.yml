name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Sync dependencies from lockfile
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests -p "test_*.py"

      - name: Compile check
        run: uv run python -m compileall -q .
